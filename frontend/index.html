<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCSA Issue Tracker</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">SCSA Issue Tracker</p>
            <h1>Auth API Console</h1>
          </div>
          <div class="server-chip">
            <span class="status-dot" id="serverStatusDot"></span>
            <span id="serverStatusText">checking</span>
          </div>
        </header>

        <section class="grid">
          <form class="panel" id="signupForm">
            <div class="panel-header">
              <h2>회원가입</h2>
              <span>POST /api/v1/users</span>
            </div>
            <label>
              Username
              <input name="username" autocomplete="username" value="frontuser" />
            </label>
            <label>
              Email
              <input name="email" autocomplete="email" value="frontuser@example.com" />
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="new-password" value="1234" />
            </label>
            <button type="submit">Create User</button>
          </form>

          <form class="panel" id="loginForm">
            <div class="panel-header">
              <h2>로그인</h2>
              <span>POST /api/v1/auth/login</span>
            </div>
            <label>
              Username
              <input name="username" autocomplete="username" value="bcryptuser" />
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="current-password" value="1234" />
            </label>
            <button type="submit">Login</button>
          </form>

          <section class="panel auth-panel">
            <div class="panel-header">
              <h2>토큰</h2>
              <span>Authorization</span>
            </div>
            <textarea id="tokenOutput" spellcheck="false" placeholder="로그인하면 accessToken이 저장됩니다."></textarea>
            <div class="button-row">
              <button type="button" id="loadMeButton">내 정보 조회</button>
              <button type="button" id="loadUsersButton">사용자 목록</button>
              <button type="button" class="ghost" id="clearTokenButton">토큰 삭제</button>
            </div>
          </section>
        </section>

        <section class="result-panel">
          <div class="panel-header">
            <h2>응답</h2>
            <span id="lastRequestLabel">ready</span>
          </div>
          <pre id="resultOutput">{}</pre>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
