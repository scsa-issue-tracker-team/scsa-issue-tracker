<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCSA Issue Tracker</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">DS / DX / SDS 협업 콘솔</p>
          <h1>SCSA Issue Tracker</h1>
        </div>
        <div class="status-row">
          <span class="server-pill" id="serverPill">
            <span id="serverStatusDot" class="dot"></span>
            <span id="serverStatusText">backend 확인 중</span>
          </span>
          <span class="user-pill" id="currentUserPill">로그인 필요</span>
        </div>
      </header>

      <main class="main-grid">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-head">
              <h2>인증</h2>
              <button class="ghost-button" id="clearTokenButton" type="button">로그아웃</button>
            </div>

            <form class="stack-form" id="loginForm">
              <label>
                아이디
                <input name="username" autocomplete="username" value="bcryptuser" />
              </label>
              <label>
                비밀번호
                <input name="password" type="password" autocomplete="current-password" value="1234" />
              </label>
              <button class="primary-button" type="submit">로그인</button>
            </form>

            <div class="button-row">
              <button type="button" id="loadMeButton">내 정보</button>
              <button type="button" id="loadUsersButton">사용자 목록</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>회원가입</h2>
            </div>
            <form class="stack-form" id="signupForm">
              <label>
                아이디
                <input name="username" autocomplete="off" placeholder="new_user" />
              </label>
              <label>
                이메일
                <input name="email" type="email" autocomplete="off" placeholder="new_user@example.com" />
              </label>
              <label>
                비밀번호
                <input name="password" type="password" autocomplete="new-password" placeholder="1234" />
              </label>
              <button type="submit">계정 만들기</button>
            </form>
          </section>

          <section class="panel token-panel">
            <div class="panel-head">
              <h2>토큰</h2>
            </div>
            <textarea id="tokenOutput" spellcheck="false" aria-label="JWT access token"></textarea>
          </section>
        </aside>

        <section class="workspace">
          <section class="panel project-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Project</p>
                <h2>프로젝트</h2>
              </div>
              <button type="button" id="loadProjectsButton">내 프로젝트 새로고침</button>
            </div>

            <div class="split-grid">
              <form class="stack-form" id="projectForm">
                <label>
                  프로젝트명
                  <input name="name" value="SCSA Issue Tracker" />
                </label>
                <label>
                  설명
                  <textarea name="description">조직 공통 이슈 관리 프로젝트</textarea>
                </label>
                <button class="primary-button" type="submit">프로젝트 생성</button>
              </form>

              <div>
                <div class="active-box">
                  <span>선택 프로젝트</span>
                  <strong id="activeProjectLabel">없음</strong>
                </div>
                <div class="list-box" id="projectList"></div>
              </div>
            </div>
          </section>

          <section class="panel issue-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Issue</p>
                <h2>이슈 작업대</h2>
              </div>
              <div class="inline-fields">
                <label>
                  Project ID
                  <input id="projectIdInput" inputmode="numeric" />
                </label>
                <label>
                  Issue ID
                  <input id="issueIdInput" inputmode="numeric" />
                </label>
              </div>
            </div>

            <div class="issue-grid">
              <form class="stack-form" id="issueCreateForm">
                <h3>생성</h3>
                <label>
                  제목
                  <input name="title" value="월간 리포트 데이터 검증 요청" />
                </label>
                <label>
                  내용
                  <textarea name="content">5월 매출 리포트의 일부 지표가 이전 데이터와 맞지 않아 확인이 필요합니다.</textarea>
                </label>
                <div class="three-cols">
                  <label>
                    유형
                    <select name="issueType">
                      <option>BUG</option>
                      <option selected>FEATURE</option>
                      <option>TASK</option>
                    </select>
                  </label>
                  <label>
                    상태
                    <select name="status">
                      <option selected>OPEN</option>
                      <option>IN_PROGRESS</option>
                      <option>DONE</option>
                      <option>CLOSED</option>
                    </select>
                  </label>
                  <label>
                    우선순위
                    <select name="priority">
                      <option>LOW</option>
                      <option selected>MEDIUM</option>
                      <option>HIGH</option>
                      <option>CRITICAL</option>
                    </select>
                  </label>
                </div>
                <label>
                  담당자 ID
                  <input name="assigneeId" inputmode="numeric" placeholder="비워도 됨" />
                </label>
                <button class="primary-button" type="submit">이슈 생성</button>
              </form>

              <form class="stack-form" id="issueUpdateForm">
                <h3>조회 / 수정 / 삭제</h3>
                <div class="button-row">
                  <button type="button" id="getIssueButton">상세 조회</button>
                  <button class="danger-button" type="button" id="deleteIssueButton">삭제</button>
                </div>
                <label>
                  제목
                  <input name="title" placeholder="수정할 때만 입력" />
                </label>
                <label>
                  내용
                  <textarea name="content" placeholder="수정할 때만 입력"></textarea>
                </label>
                <div class="three-cols">
                  <label>
                    유형
                    <select name="issueType">
                      <option value="">변경 안 함</option>
                      <option>BUG</option>
                      <option>FEATURE</option>
                      <option>TASK</option>
                    </select>
                  </label>
                  <label>
                    상태
                    <select name="status">
                      <option value="">변경 안 함</option>
                      <option>OPEN</option>
                      <option>IN_PROGRESS</option>
                      <option>DONE</option>
                      <option>CLOSED</option>
                    </select>
                  </label>
                  <label>
                    우선순위
                    <select name="priority">
                      <option value="">변경 안 함</option>
                      <option>LOW</option>
                      <option>MEDIUM</option>
                      <option>HIGH</option>
                      <option>CRITICAL</option>
                    </select>
                  </label>
                </div>
                <label>
                  담당자 ID
                  <input name="assigneeId" inputmode="numeric" placeholder="변경 안 함" />
                </label>
                <button type="submit">이슈 수정</button>
              </form>
            </div>

            <div class="recent-strip" id="recentIssueList"></div>
          </section>

          <section class="panel comments-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Comment</p>
                <h2>댓글</h2>
              </div>
              <button type="button" id="loadCommentsButton">댓글 조회</button>
            </div>
            <form class="comment-form" id="commentForm">
              <textarea name="content">LGTM. 확인했습니다.</textarea>
              <button class="primary-button" type="submit">댓글 작성</button>
            </form>
            <div class="list-box comments-list" id="commentList"></div>
          </section>

          <section class="panel users-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">User</p>
                <h2>사용자</h2>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
              </table>
            </div>
          </section>

          <section class="panel response-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">API Result</p>
                <h2 id="lastRequestLabel">대기 중</h2>
              </div>
              <button type="button" id="clearLogButton">로그 비우기</button>
            </div>
            <pre id="resultOutput">{}</pre>
            <div class="log-list" id="requestLog"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
